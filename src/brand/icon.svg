<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes neural-dash {
to { stroke-dashoffset: -46; }
}
@keyframes core-flash {
0%, 100% {
opacity: 0.5;
transform: scale(0.85);
filter: blur(1px);
}
50% {
opacity: 1;
transform: scale(1.2);
filter: blur(0px) drop-shadow(0 0 12px #fff) drop-shadow(0 0 20px #00F5FF);
}
}
.neural-border {
animation: neural-dash 4s linear infinite;
stroke-linecap: round;
}
.core {
animation: core-flash 2s ease-in-out infinite;
transform-origin: center;
transform-box: fill-box;
}
</style>

<defs>
<linearGradient id="neural-grad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00F5FF" />
<stop offset="100%" stop-color="#8B5CF6" />
</linearGradient>
</defs>

<circle
cx="50" cy="50" r="42"
stroke="url(#neural-grad)"
stroke-width="6"
stroke-dasharray="8 15"
class="neural-border"
/>
<circle
cx="50" cy="50" r="8"
fill="white"
class="core"
/>
</svg>
